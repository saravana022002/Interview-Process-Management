<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Candidate Signup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<main class="page">
    <div class="topbar">
        <span class="kicker">Candidate</span>
        <a class="btn ghost" href="index.html">Back</a>
    </div>

    <section class="card" style="max-width:640px;">
        <h2>Test Signup</h2>
        <p>Register your details for the test date. You can start only after admin approval.</p>

        <form action="SaveServlet" method="post">
            <div class="field-grid two">
                <label>Name
                    <input type="text" name="name" required>
                </label>
                <label>Test Date
                    <input type="number" name="date" required>
                </label>
                <label>Email
                    <input type="email" name="email" required>
                </label>
                <label>City
                    <select name="city" required>
                        <option value="Chennai">Chennai</option>
                        <option value="Mysore">Mysore</option>
                        <option value="Trichy">Trichy</option>
                        <option value="Madurai">Madurai</option>
                        <option value="Salem">Salem</option>
                    </select>
                </label>
            </div>
            <div class="actions">
                <input type="submit" value="Save And Continue">
            </div>
        </form>
    </section>
</main>
</body>
</html>
